syntax = "proto3";

package order;

option java_multiple_files = true;
option java_package = "com.forside.technl.grpc";
option java_outer_classname = "OrderProto";

service OrderGrpcService {

  // GET /api/v1/beers
  rpc GetBeers(GetBeersRequest)
    returns (GetBeersResponse);

  // POST /api/v1/orders
  rpc CreateOrder(CreateOrderRequest)
    returns (CreateOrderResponse);

  // POST /api/v1/orders/{orderId}/pay
  rpc PayOrder(PayOrderRequest)
    returns (PayOrderResponse);

  // GET /api/v1/orders
  rpc GetOrders(GetOrdersRequest)
    returns (GetOrdersResponse);
}

message GetBeersRequest {}

message GetBeersResponse {
  repeated Beer beers = 1;
}

message Beer {
  string id = 1;
  string name = 2;
  double price = 3;
}

message CreateOrderRequest {
  repeated OrderItem items = 1;
}

message OrderItem {
  string beer_id = 1;
  int32 quantity = 2;
}

message CreateOrderResponse {
  string order_id = 1;
  string status = 2;
  double total_amount = 3;
}

message PayOrderRequest {
  string order_id = 1;
  string payment_method = 2;
  double amount = 3;
}

message PayOrderResponse {
  string order_id = 1;
  string status = 2;
}

message GetOrdersRequest {}

message GetOrdersResponse {
  repeated Order orders = 1;
}

message Order {
  string order_id = 1;
  double total_amount = 2;
  string status = 3;
  string payment_method = 4;
  string paid_at = 5;
  string created_at = 6;
  repeated OrderItemResponse items = 7;
}

message OrderItemResponse {
  string beer_id = 1;
  string beer_name = 2;
  int32 quantity = 3;
  double unit_price = 4;
  double total_price = 5;
}